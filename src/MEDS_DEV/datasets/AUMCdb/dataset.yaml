    - https://lifesciences.datastations.nl/dataset.xhtml?persistentId=doi:10.17026/dans-22u-f8vd
    - https://journals.lww.com/ccmjournal/fulltext/2021/06000/sharing_icu_patient_data_responsibly_under_the.16.aspx
  contacts:
    - name: "Patrick Rockenschaub"
      github_username: "prockenschaub"
    - name: "Robin P. van de Water"
