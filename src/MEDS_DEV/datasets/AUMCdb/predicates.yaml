predicates:
  icu_admission:
    code: { regex: "^ICU_ADMISSION//.*" }
  icu_discharge:
    code: { regex: "^ICU_DISCHARGE//.*" }
# largely based on https://github.com/AmsterdamUMC/AmsterdamUMCdb/blob/2901fdda2ff8f7ae0f16191d0b3f6d0ac60f70b6/amsterdamumcdb/sql/common/legacy/
creatinine_1:
  code: MEASURE//Kreatinine (bloed)//�mol/l
creatinine_2:
  code: MEASURE//Kreatinine//�mol/l
# Todo: convert to mg/dL
abnormally_high_creatinine_1:
  code: MEASURE//Kreatinine (bloed)//�mol/l
  value_min: 1.3 # mg/dL
  value_min_inclusive: False
  value_max: null
abnormally_high_creatinine_2:
  code: MEASURE//Kreatinine//�mol/l
  value_min: 1.3 # mg/dL
  value_min_inclusive: False
  value_max: null
creatinine:
  expr: or(creatinine_1, creatinine_2)
abnormally_high_creatinine:
  expr: or(abnormally_high_creatinine_1, abnormally_high_creatinine_2)

# Todo: convert units
sodium_1:
  code: MEASURE//Natrium (bloed)//mmol/l
# sodium_2:
#   code: LAB//50983//mEq/L
# sodium_3:
#   code: LAB//52623//mEq/L
abnormally_low_sodium_1:
  code: MEASURE//Natrium (bloed)//mmol/l
  value_min: null
  value_max: 135 # mEq/L
  value_max_inclusive: False
# abnormally_low_sodium_2:
#   code: LAB//50983//mEq/L
#   value_min: null
#   value_max: 135 # mEq/L
#   value_max_inclusive: False
# abnormally_low_sodium_3:
#   code: LAB//52623//mEq/L
#   value_min: null
#   value_max: 135 # mEq/L
#   value_max_inclusive: False
sodium:
  expr: or(sodium_1, sodium_2, sodium_3)
abnormally_low_sodium:
  expr: or(abnormally_low_sodium_1, abnormally_low_sodium_2, abnormally_low_sodium_3)

bicarbonate_1:
  code: MEASURE//Act.HCO3 (bloed)//mmol/l
bicarbonate_2:
  code: MEASURE//HCO3//mmol/l
abnormally_low_bicarbonate_1:
  code: MEASURE//Act.HCO3 (bloed)//mmol/l
  value_min: null
  value_max: 22 # mEq/L
  value_max_inclusive: False
abnormally_low_bicarbonate_2:
  code: MEASURE//HCO3//mmol/l
  value_min: null
  value_max: 22 # mEq/L
  value_max_inclusive: False
bicarbonate:
  expr: or(bicarbonate_1, bicarbonate_2)
abnormally_low_bicarbonate:
  expr: or(abnormally_low_bicarbonate_1, abnormally_low_bicarbonate_2)

hemoglobin_1:
  code: MEASURE//Hemoglobine//mmol/l
hemoglobin_2:
  code: MEASURE//Hb (bloed)//mmol/l
hemoglobin_3:
  code: "MEASURE//Hb(v.Bgs) (bloed)//mmol/l"
abnormally_low_hemoglobin_1:
  code: MEASURE//Hemoglobine//mmol/l
  value_min: null
  value_max: 13 # g/dL
  value_max_inclusive: False
abnormally_low_hemoglobin_2:
  code: "MEASURE//Hb (bloed)//mmol/l"
  value_min: null
  value_max: 13 # g/dL
  value_max_inclusive: False
abnormally_low_hemoglobin_3:
  code: "MEASURE//Hb(v.Bgs) (bloed)//mmol/l"
  value_min: null
  value_max: 13 # g/dL
  value_max_inclusive: False
hemoglobin:
  expr: or(hemoglobin_1, hemoglobin_2)
abnormally_low_hemoglobin:
  expr: or(abnormally_low_hemoglobin_1, abnormally_low_hemoglobin_2)

wbc_1:
  code: MEASURE//Leucocyten//10^9/l
wbc_2:
  code: MEASURE//Leuco's (bloed)//10^9/l
abnormally_high_wbc_1:
  code: MEASURE//Leucocyten//10^9/l
  value_min: 11 # K/uL
  value_min_inclusive: False
  value_max: null
abnormally_high_wbc_2:
  code: MEASURE//Leuco's (bloed)//10^9/l
  value_min: 11 # K/uL
  value_min_inclusive: False
  value_max: null
wbc:
  expr: or(wbc_1, wbc_2)
abnormally_high_wbc:
  expr: or(abnormally_high_wbc_1, abnormally_high_wbc_2)

platelets_1:
  code: MEASURE//Thrombo's (bloed)//10^9/l
platelets_2:
  code: MEASURE//Thrombocyten//10^9/l
abnormally_low_platelets_1:
  code: MEASURE//Thrombo's (bloed)//10^9/l
  value_min: null
  value_max: 150 # K/uL
  value_max_inclusive: False
abnormally_low_platelets_2:
  code: MEASURE//Thrombocyten//10^9/l
  value_min: null
  value_max: 150 # K/uL
  value_max_inclusive: False
platelets:
  expr: or(platelets_1, platelets_2)
abnormally_low_platelets:
  expr: or(abnormally_low_platelets_1, abnormally_low_platelets_2)

map_1:
  code: MEASURE//ABP gemiddeld//mmHg
map_2:
  code: MEASURE//Niet invasieve bloeddruk gemiddeld//mmHg
# map_3:
#   code: LAB//225312//mmHg
abnormally_low_map_1:
  code: MEASURE//ABP gemiddeld//mmHg
  value_min: null
  value_max: 65 # mmHg
  value_max_inclusive: False
abnormally_low_map_2:
  code: MEASURE//Niet invasieve bloeddruk gemiddeld//mmHg
  value_min: null
  value_max: 65 # mmHg
  value_max_inclusive: False
# abnormally_low_map_3:
#   code: LAB//225312//mmHg
#   value_min: null
#   value_max: 65 # mmHg
#   value_max_inclusive: False
map:
  expr: or(map_1, map_2)
abnormally_low_map:
  expr: or(abnormally_low_map_1, abnormally_low_map_2)
