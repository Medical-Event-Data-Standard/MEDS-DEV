name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "dev"]
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Weekly full regression on Sundays at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      scope:
        description: "Test scope: fast or full"
        required: false
        default: "full"
        type: choice
        options:
          - fast
          - full

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Determine which test lanes to run
  # ---------------------------------------------------------------------------
  determine-scope:
    runs-on: ubuntu-latest
    outputs:
      run_full: ${{ steps.scope.outputs.run_full }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
      changed_datasets: ${{ steps.scope.outputs.changed_datasets }}
      changed_tasks: ${{ steps.scope.outputs.changed_tasks }}
      changed_models: ${{ steps.scope.outputs.changed_models }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine test scope
        id: scope
        run: |
          # Manual dispatch overrides (only fast or full — no affected, since there's no PR diff context)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCOPE="${{ github.event.inputs.scope }}"
            if [[ "$SCOPE" == "fast" ]]; then
              echo "run_full=false" >> "$GITHUB_OUTPUT"
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
              echo "changed_datasets=[]" >> "$GITHUB_OUTPUT"
              echo "changed_tasks=[]" >> "$GITHUB_OUTPUT"
              echo "changed_models=[]" >> "$GITHUB_OUTPUT"
              echo "reason=manual dispatch: fast only" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "run_full=true" >> "$GITHUB_OUTPUT"
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
              echo "changed_datasets=[]" >> "$GITHUB_OUTPUT"
              echo "changed_tasks=[]" >> "$GITHUB_OUTPUT"
              echo "changed_models=[]" >> "$GITHUB_OUTPUT"
              echo "reason=manual dispatch: full" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Push to main or schedule → always full
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "run_full=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "changed_datasets=[]" >> "$GITHUB_OUTPUT"
            echo "changed_tasks=[]" >> "$GITHUB_OUTPUT"
            echo "changed_models=[]" >> "$GITHUB_OUTPUT"
            echo "reason=push to main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "run_full=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "changed_datasets=[]" >> "$GITHUB_OUTPUT"
            echo "changed_tasks=[]" >> "$GITHUB_OUTPUT"
            echo "changed_models=[]" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for full-ci label on PRs
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}" == "true" ]]; then
              echo "run_full=true" >> "$GITHUB_OUTPUT"
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
              echo "changed_datasets=[]" >> "$GITHUB_OUTPUT"
              echo "changed_tasks=[]" >> "$GITHUB_OUTPUT"
              echo "changed_models=[]" >> "$GITHUB_OUTPUT"
              echo "reason=full-ci label present" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # PR: detect affected components
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"

          if [[ -z "$BASE_REF" ]]; then
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"
          fi

          python .github/scripts/select_test_scope.py "$BASE_REF" "$HEAD_REF"

      - name: Print scope summary
        run: |
          echo "### Test Scope" >> "$GITHUB_STEP_SUMMARY"
          echo "- **run_full**: ${{ steps.scope.outputs.run_full }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **docs_only**: ${{ steps.scope.outputs.docs_only }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **datasets**: ${{ steps.scope.outputs.changed_datasets }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **tasks**: ${{ steps.scope.outputs.changed_tasks }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **models**: ${{ steps.scope.outputs.changed_models }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **reason**: ${{ steps.scope.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 2: Fast checks — always run
  # ---------------------------------------------------------------------------
  fast-checks:
    runs-on: ubuntu-latest
    needs: [determine-scope]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"

      - name: Doctests and unit tests
        run: uv run pytest --doctest-modules -m "not integration" -x

  # ---------------------------------------------------------------------------
  # Job 3: Dataset lane — run for changed datasets (when not doing full)
  # ---------------------------------------------------------------------------
  dataset-lane:
    runs-on: ubuntu-latest
    needs: [determine-scope, fast-checks]
    if: >-
      needs.determine-scope.outputs.run_full != 'true' &&
      needs.determine-scope.outputs.docs_only != 'true' &&
      needs.determine-scope.outputs.changed_datasets != '[]'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        dataset: ${{ fromJson(needs.determine-scope.outputs.changed_datasets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"

      - name: Run dataset integration tests for ${{ matrix.dataset }}
        env:
          DATASET: ${{ matrix.dataset }}
        run: |
          uv run pytest -v -s -x -m integration --test_dataset="$DATASET"

  # ---------------------------------------------------------------------------
  # Job 4: Task lane — run for changed tasks (when not doing full)
  # ---------------------------------------------------------------------------
  task-lane:
    runs-on: ubuntu-latest
    needs: [determine-scope, fast-checks]
    if: >-
      needs.determine-scope.outputs.run_full != 'true' &&
      needs.determine-scope.outputs.docs_only != 'true' &&
      needs.determine-scope.outputs.changed_tasks != '[]'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.determine-scope.outputs.changed_tasks) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"

      - name: Run task integration tests for ${{ matrix.task }}
        env:
          TASK: ${{ matrix.task }}
        run: |
          uv run pytest -v -s -x -m integration --test_task="$TASK"

  # ---------------------------------------------------------------------------
  # Job 5: Model lane — run for changed models (when not doing full)
  # ---------------------------------------------------------------------------
  model-lane:
    runs-on: ubuntu-latest
    needs: [determine-scope, fast-checks]
    if: >-
      needs.determine-scope.outputs.run_full != 'true' &&
      needs.determine-scope.outputs.docs_only != 'true' &&
      needs.determine-scope.outputs.changed_models != '[]'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.determine-scope.outputs.changed_models) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"

      - name: Run model integration tests for ${{ matrix.model }}
        env:
          MODEL: ${{ matrix.model }}
        run: |
          uv run pytest -v -s -x -m integration --test_model="$MODEL"

  # ---------------------------------------------------------------------------
  # Job 6: Full integration — push to main, schedule, label, or core changes
  # ---------------------------------------------------------------------------
  full-integration:
    runs-on: ubuntu-latest
    needs: [determine-scope, fast-checks]
    if: needs.determine-scope.outputs.run_full == 'true'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.11"

      - name: Run full test suite
        run: |
          uv run pytest -v --doctest-modules --cov=src --cov-report=xml --junitxml=junit.xml -s -x

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./junit.xml

  # ---------------------------------------------------------------------------
  # Job 7: Summary — report what ran (named run_tests_ubuntu for branch ruleset compatibility)
  # ---------------------------------------------------------------------------
  run_tests_ubuntu:
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        determine-scope,
        fast-checks,
        dataset-lane,
        task-lane,
        model-lane,
        full-integration,
      ]
    steps:
      - name: Write summary
        run: |
          echo "### CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| fast-checks | ${{ needs.fast-checks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dataset-lane | ${{ needs.dataset-lane.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| task-lane | ${{ needs.task-lane.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| model-lane | ${{ needs.model-lane.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| full-integration | ${{ needs.full-integration.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scope reason**: ${{ needs.determine-scope.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check required jobs
        run: |
          FAILED=""
          if [[ "${{ needs.fast-checks.result }}" == "failure" ]]; then
            FAILED="$FAILED fast-checks"
          fi
          if [[ "${{ needs.dataset-lane.result }}" == "failure" ]]; then
            FAILED="$FAILED dataset-lane"
          fi
          if [[ "${{ needs.task-lane.result }}" == "failure" ]]; then
            FAILED="$FAILED task-lane"
          fi
          if [[ "${{ needs.model-lane.result }}" == "failure" ]]; then
            FAILED="$FAILED model-lane"
          fi
          if [[ "${{ needs.full-integration.result }}" == "failure" ]]; then
            FAILED="$FAILED full-integration"
          fi
          if [[ -n "$FAILED" ]]; then
            echo "Failed jobs:$FAILED"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
